name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  macos:
    runs-on: macos-14
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate zsh syntax
        run: |
          for script in CardyMcCardface/Resources/photo_import.sh CardyMcCardface/Resources/dashboard.sh install.sh uninstall.sh tests/smoke_test.zsh; do
            /bin/zsh -n "$script"
          done

      - name: Validate app Info.plist
        run: /usr/bin/plutil -lint CardyMcCardface/Info.plist

      - name: Build Xcode app
        run: |
          /usr/bin/xcodebuild \
            -project CardyMcCardface.xcodeproj \
            -scheme CardyMcCardface \
            -configuration Release \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Run smoke test
        run: /bin/zsh tests/smoke_test.zsh

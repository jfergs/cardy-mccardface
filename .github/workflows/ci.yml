name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  macos:
    runs-on: macos-14
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate zsh syntax
        run: |
          /bin/zsh -n photo_import.sh
          /bin/zsh -n install.sh
          /bin/zsh -n uninstall.sh
          /bin/zsh -n tests/smoke_test.zsh

      - name: Validate LaunchAgent plist
        run: /usr/bin/plutil -lint com.cardymccardface.photoimporter.plist

      - name: Run smoke test
        run: /bin/zsh tests/smoke_test.zsh
